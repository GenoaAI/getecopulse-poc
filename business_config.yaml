solar_physics:
  usable_surface_ratio: 0.85      # structural reserve (edges, walkways)
  sqm_per_kwp: 5.5                # m² of roof needed per kWp installed (mono-Si panels)
  performance_ratio: 0.80         # system losses: inverter, wiring, soiling

financials:
  default_energy_price_kwh: 0.18  # EUR/kWh (French industrial tariff)
  capex_per_kwp_industrial: 900   # EUR/kWp all-in (supply + install)
  cout_moyen_kva_eur: 20          # €/kVA/an — abonnement B2B réseau (conservative)
  power_margin_safety_pct: 0.10   # safety margin above measured peak (+10 %)
  power_round_kva: 10             # round recommended power to nearest N kVA

emission_factors:                 # kgCO2/kWh — IEA 2023 electricity emission factors
  FR: 0.052                       # nuclear-heavy grid
  DE: 0.380
  GB: 0.233
  ES: 0.195
  IT: 0.372
  NL: 0.290
  BE: 0.167
  PL: 0.773
  US: 0.386
  CA: 0.130
  MX: 0.454
  BR: 0.074                       # hydro-heavy
  CN: 0.581
  JP: 0.463
  IN: 0.708
  AU: 0.610
  ZA: 0.928                       # coal-heavy
  DEFAULT: 0.400                  # world average approximation

energy_profiles:                  # Reference consumption kWh/m²/year by sector
  NAF_BUREAUX:
    kwh_per_m2: 150
    night_talon_pct: 0.15         # offices mostly empty at night
    peak_hours: [8, 19]           # activity window (hours)
    weekend_factor: 0.05          # fraction of weekday consumption on weekends
    eui_median_global: 160        # IEA global median — office buildings (kWh/m²/year)
  NAF_INDUSTRIE:
    kwh_per_m2: 300
    night_talon_pct: 0.30         # compressors, standby equipment, lighting
    peak_hours: [6, 22]
    weekend_factor: 0.40
    eui_median_global: 240        # IEA global median — manufacturing
  NAF_ENTREPOT:
    kwh_per_m2: 50
    night_talon_pct: 0.20         # refrigeration, security lighting
    peak_hours: [7, 20]
    weekend_factor: 0.30
    eui_median_global: 65         # IEA global median — warehouses / logistics
  NAF_COMMERCE:
    kwh_per_m2: 200
    night_talon_pct: 0.25         # display lighting, HVAC base load
    peak_hours: [9, 21]
    weekend_factor: 0.85          # commerce open on weekends
    eui_median_global: 250        # IEA global median — retail
  NAF_ENSEIGNEMENT:
    kwh_per_m2: 120
    night_talon_pct: 0.10         # mostly off at nights and weekends
    peak_hours: [8, 17]
    weekend_factor: 0.02
    eui_median_global: 130        # IEA global median — education
  NAF_SANTE:
    kwh_per_m2: 350
    night_talon_pct: 0.20         # 24/7 ops but relatively optimised
    peak_hours: [7, 21]
    weekend_factor: 0.90          # hospitals always on
    eui_median_global: 400        # IEA global median — healthcare
  NAF_HOTELLERIE:
    kwh_per_m2: 280
    night_talon_pct: 0.25         # night services, HVAC, common areas
    peak_hours: [7, 23]
    weekend_factor: 1.10          # hotels busier on weekends
    eui_median_global: 200        # IEA global median — hospitality

overpass:
  api_url: "https://overpass-api.de/api/interpreter"
  search_radius_m: 500        # rayon autour du point géocodé (500m couvre les grands sites industriels)
  image_padding_factor: 1.3   # marge autour de la bounding box (30%)
  zoom_min: 16
  zoom_max: 18
  site_area_threshold_m2: 15000   # above this, Nominatim parcel -> Overpass buildings sum
  max_bbox_diag_m: 1500       # above this, Nominatim result is likely an admin/postal polygon
  min_building_area_m2: 150   # ignore sheds/gatehouses below this area for zoom calculation

climate_fallbacks:            # used when Open-Meteo API is unavailable
  dni_annual_kwh_m2: 1150.0  # France national average solar irradiance
  temperature_mean_c: 12.5   # France annual mean temperature

thermal:
  base_loss_by_roof_type:
    flat:    0.70   # terrasse souvent sous-isolée
    gable:   0.50
    hip:     0.40   # meilleure étanchéité à l'air
    shed:    0.60
    complex: 0.65
    unknown: 0.60
  cold_climate_threshold_c: 8
  mild_climate_threshold_c: 13
  cold_multiplier: 1.3
  mild_multiplier: 1.1
